server:
    # ── Rete ────────────────────────────────────────────────────────────────
    interface: 0.0.0.0
    port: 5335
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # ── Sicurezza ────────────────────────────────────────────────────────────
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-algo-downgrade: yes
    use-caps-for-id: no          # alcuni server non lo supportano
    edns-buffer-size: 1232

    # ── Performance (ottimizzato per Pi 4 2GB) ───────────────────────────────
    prefetch: yes
    prefetch-key: yes
    num-threads: 2
    msg-cache-slabs: 2
    rrset-cache-slabs: 2
    infra-cache-slabs: 2
    key-cache-slabs: 2
    rrset-cache-size: 64m
    msg-cache-size: 32m
    so-rcvbuf: 1m

    # ── Privacy ──────────────────────────────────────────────────────────────
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes

    # ── DNSSEC ───────────────────────────────────────────────────────────────
    auto-trust-anchor-file: "/opt/unbound/etc/unbound/var/root.key"
    val-log-level: 1

    # ── Log minimale ─────────────────────────────────────────────────────────
    verbosity: 1
    log-queries: no

    # ── Accesso locale ───────────────────────────────────────────────────────
    access-control: 127.0.0.1/32 allow
    access-control: 172.20.0.0/24 allow
    access-control: 10.13.13.0/24 allow    # subnet WireGuard
    access-control: 0.0.0.0/0 refuse
