networks:
  dns_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:

  # ─── Pi-hole ───────────────────────────────────────────────────────────────
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "80:80/tcp"
    environment:
      TZ: "Europe/Rome"
      FTLCONF_webserver_api_password: "${PIHOLE_PASSWORD}"
      FTLCONF_dns_upstreams: "172.20.0.3#5335"          # punta a Unbound
      FTLCONF_dns_dnssec: "true"
      FTLCONF_dns_listeningMode: "all"
    volumes:
      - ./pihole/etc-pihole:/etc/pihole
    networks:
      dns_net:
        ipv4_address: 172.20.0.2
    depends_on:
      unbound:
        condition: service_healthy
    cap_add:
      - NET_ADMIN

  # ─── Unbound ───────────────────────────────────────────────────────────────
  unbound:
    image: mvance/unbound-rpi:latest
    container_name: unbound
    restart: unless-stopped
    volumes:
      - ./unbound/unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    healthcheck:
      test: ["CMD", "drill", "@127.0.0.1", "-p", "5335", "cloudflare.com"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      dns_net:
        ipv4_address: 172.20.0.3

  # ─── WireGuard ─────────────────────────────────────────────────────────────
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard
    restart: unless-stopped
    ports:
      - "40959:40959/udp"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Rome"
      SERVERURL: "${WG_SERVER_URL}"
      SERVERPORT: "40959"
      PEERS: "${WG_PEERS}"
      PEERDNS: "172.20.0.2"              # usa Pi-hole
      INTERNAL_SUBNET: "10.13.13.0"
      ALLOWEDIPS: "0.0.0.0/0"
    volumes:
      - ./wireguard/config:/config
      - /lib/modules:/lib/modules:ro
    networks:
      dns_net:
        ipv4_address: 172.20.0.4
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1

  # ─── DuckDNS (aggiornamento IP pubblico) ──────────────────────────────────
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Rome"
      SUBDOMAINS: "${DUCKDNS_SUBDOMAIN}"
      TOKEN: "${DUCKDNS_TOKEN}"
      UPDATE_IP: "ipv4"
      LOG_FILE: "true"
    networks:
      dns_net:
        ipv4_address: 172.20.0.6

  # ─── Uptime Kuma (monitoraggio servizi) ─────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./uptime-kuma/data:/app/data
    networks:
      dns_net:
        ipv4_address: 172.20.0.7

  # ─── Homepage (dashboard) ─────────────────────────────────────────────────
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "192.168.1.40:3000,localhost:3000"
      HOMEPAGE_VAR_PIHOLE_KEY: "${PIHOLE_PASSWORD}"
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      dns_net:
        ipv4_address: 172.20.0.9

  # ─── Watchtower (auto-update container) ───────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      TZ: "Europe/Rome"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"   # ogni notte alle 4:00
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      dns_net:
        ipv4_address: 172.20.0.10

  # ─── Netdata (opzionale) ───────────────────────────────────────────────────
  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    restart: unless-stopped
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      dns_net:
        ipv4_address: 172.20.0.5
    profiles:
      - monitoring    # avvia solo con: docker compose --profile monitoring up
