- Rete:
    - Pi-hole:
        href: http://PI_IP_ADDRESS/admin
        description: Blocco ads e DNS
        icon: pi-hole
        widget:
          type: pihole
          url: http://pihole
          version: 6
          key: "{{HOMEPAGE_VAR_PIHOLE_KEY}}"

    - Unbound:
        href: "#"
        description: DNS resolver privato
        icon: dns

- Monitoraggio:
    - Uptime Kuma:
        href: http://PI_IP_ADDRESS:3001
        description: Stato dei servizi
        icon: uptime-kuma
        widget:
          type: uptimekuma
          url: http://uptime-kuma:3001
          slug: default

    - Netdata:
        href: http://PI_IP_ADDRESS:19999
        description: CPU, RAM, temperatura
        icon: netdata
        widget:
          type: netdata
          url: http://netdata:19999
